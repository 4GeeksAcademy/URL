<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="./assets/img/4geeks.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello Rigo with Vanilla.js</title>

  <!-- Fontawesome is our recomended library for icons -->
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.2.0/css/all.css"
    integrity="sha384-hWVjflwFxL6sNzntih27bfxkr27PmbbK/iSvJ+a4+0owXq79v+lsFkW54bOGbiDQ" crossorigin="anonymous" />
</head>

<body>


  <div class="container text-center py-5">
    <h1 class="mb-4">Generador de cartas 🎴</h1>

    <div class="card-box mb-4" id="card">
      <div class="palorandom" id="palotop"></div>
      <div class="numerorandom" id="numeros"></div>
      <div class="palorandom rotated" id="palobot"></div>
    </div>

    <button class="btn btn-primary" id="generateBtn">
      Generar carta
    </button>
  </div>

  <script src="app.js"></script>

  <!-- Do not delete this script tag, this is what connects your HTML with the Javascript code -->
  <script type="module" src="/app.js"></script>
</body>

</html>
